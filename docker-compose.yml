version: "3.9"

services:

  # ─── Redpanda (Kafka-compatible broker) ────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: redpanda
    environment:
      REDPANDA_AUTO_CREATE_TOPICS_ENABLED: "true"
      REDPANDA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "9644:9644"
    networks:
      - freight-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ─── Redpanda Console (UI) ──────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - freight-net

  # ─── PostgreSQL (source database) ──────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=256
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - freight-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Debezium Kafka Connect ─────────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: debezium
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: debezium-freight-group
      CONFIG_STORAGE_TOPIC: debezium.configs
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_TOPIC: debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_PRODUCER_MAX_REQUEST_SIZE: "10485760"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - freight-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ─── Debezium setup (one-shot: registers the Postgres connector) ────────────
  debezium-setup:
    image: curlimages/curl:latest
    container_name: debezium-setup
    volumes:
      - ./debezium:/debezium
    depends_on:
      debezium:
        condition: service_healthy
    networks:
      - freight-net
    entrypoint: ["/bin/sh", "/debezium/register-connector.sh"]
    restart: "no"

  # ─── Materialize (streaming SQL engine) ────────────────────────────────────
  materialized:
    image: materialize/materialized:latest
    container_name: materialized
    ports:
      - "6875:6875"
      - "6876:6876"
    networks:
      - freight-net
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 6875 -U materialize -c 'SELECT 1' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 25
      start_period: 30s

  # ─── Materialize setup (one-shot: creates sources, views, sinks) ────────────
  materialize-setup:
    image: postgres:16
    container_name: materialize-setup
    volumes:
      - ./materialize:/materialize
    depends_on:
      materialized:
        condition: service_healthy
      debezium:
        condition: service_healthy
    networks:
      - freight-net
    entrypoint: /bin/sh
    command:
      - -c
      - "psql -h materialized -p 6875 -U materialize -d materialize -f /materialize/setup.sql"
    restart: "no"

  # ─── Data Generator ─────────────────────────────────────────────────────────
  generator:
    build: ./generator
    container_name: generator
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      INSERT_INTERVAL_MS: "500"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freight-net
    restart: unless-stopped

  # ─── Kafka Consumer (reads Materialize sink topics) ─────────────────────────
  consumer:
    build: ./consumer
    container_name: consumer
    environment:
      REDPANDA_BROKERS: redpanda:9092
      TOPICS: mz.active_shipments,mz.revenue_by_route,mz.job_summary
    depends_on:
      materialize-setup:
        condition: service_completed_successfully
    networks:
      - freight-net
    restart: unless-stopped

  # ─── FastAPI (CRUD API) ───────────────────────────────────────────────
  api:
    build: ./api
    container_name: api
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freight-net
    restart: unless-stopped

  # ─── Streamlit Dashboard (Real-time tracking UI) ───────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      MATERIALIZE_DSN: postgresql://materialize@materialized:6875/materialize
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8501:8501"
    depends_on:
      materialize-setup:
        condition: service_completed_successfully
    networks:
      - freight-net
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  freight-net:
    driver: bridge
